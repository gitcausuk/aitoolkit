select:focus,input:focus,textarea:focus{outline:none;border-color:#B0902F!important;box-shadow:0 0 0 3px rgba(176,144,47,0.14)}
textarea{resize:vertical}
body{font-feature-settings:'kern' 1,'liga' 1}
html{scroll-behavior:smooth}
*{-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px;height:6px}
@media print{body{background:#fff!important}nav,div[style*="position:sticky"]{position:static!important}button{display:none!important}.hide-mobile{display:block!important}.hide-on-print{display:none!important}*{box-shadow:none!important}}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c4bfb8;border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#a8a29a}
button:focus-visible{outline:2px solid #B0902F;outline-offset:2px}
a{color:#163A73;text-decoration:none;transition:color 0.15s ease}
a:hover{color:#002147;text-decoration:underline}
@keyframes sectionEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-enter{animation:sectionEnter 0.32s cubic-bezier(0.22,1,0.36,1) forwards}
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip-link:focus{position:fixed;top:0;left:0;width:auto;height:auto;padding:10px 16px;background:#002147;color:#fff;font-size:14px;font-weight:600;z-index:9999;text-decoration:none}
@media(max-width:640px){.hide-mobile{display:none!important}.nav-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.nav-scroll::-webkit-scrollbar{display:none}}

      {n:2,title:'Add conceptual explanation questions',body:'Pair calculation questions with short conceptual questions: what does this result mean, why is this method appropriate, what would change if an assumption were altered? These test genuine understanding that cannot be delegated to AI.'},

      {n:2,title:'Ask students to explain the code structure',body:"Require a brief written explanation of the key design choices: why this structure, why these functions, why this approach to the problem. Genuine understanding of code one has written is immediately apparent; inability to explain is equally diagnostic."},
      {n:3,title:'Require comments identifying AI-generated code',body:"Where AI coding assistance is permitted, require students to comment the code to identify which sections were AI-generated, what the AI produced, and what modifications the student made. This makes the student's intellectual contribution visible."},

      {n:2,title:'Include a methods memo explaining choices',body:'Require a brief methods memo (300-500 words) explaining which analytical approach was chosen and why, what alternatives were considered, and what limitations the chosen method carries. This tests the understanding behind the analysis.'},

      const phraseInSnippet = terms.length > 1 && snippetL.indexOf(phrase) !== -1;
      return { labelHits, anyHits, phraseInLabel, phraseInSnippet };

          refIndex: fr.refIndex,
